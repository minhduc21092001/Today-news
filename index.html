<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tin tức hôm nay</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1a1a2e 50%, #0a1628 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #fff;
            text-align: center;
            font-size: 28px;
            padding: 20px 0 10px;
        }
        .subtitle {
            color: #888;
            text-align: center;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .news-card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 25px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }
        .card-header {
            background: #081950;
            color: #fff;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: bold;
        }
        .news-card img { width: 100%; display: block; }
        .card-body { padding: 16px; }
        .card-body h3 {
            font-size: 16px;
            color: #1a1a2e;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .source {
            font-size: 13px;
            color: #888;
            margin-bottom: 14px;
        }
        .source a { color: #1a73e8; text-decoration: none; }
        .btn-shopee {
            display: block;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            background: #cc3300;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: transform 0.2s;
        }
        .btn-shopee:hover { transform: translateY(-1px); }
        .footer {
            text-align: center;
            margin: 30px 0;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📰 Tin tức hôm nay</h1>
        <div class="subtitle">Tổng hợp tin tức nóng nhất trong ngày</div>
        
        <div class="news-card">
            <div class="card-header">Tin 1</div>
            <img src="news_card_Thảm_kịch_động_đất_ở_Philippin.png" alt="Thảm kịch động đất ở Philippines: Ít nhất 32 người thiệt mạng, sóng thần tràn bờ">
            <div class="card-body">
                <h3>Thảm kịch động đất ở Philippines: Ít nhất 32 người thiệt mạng, sóng thần tràn bờ</h3>
                <div class="source">
                    Nguồn: Thanh Niên
                     | <a href="https://thanhnien.vn/tham-kich-dong-dat-o-philippines-it-nhat-32-nguoi-thiet-mang-song-than-tran-bo-185260608203807817.htm">Đọc bài gốc</a>
                </div>
                <a href="https://s.shopee.vn/gNVsQiOnE" class="btn-shopee" target="_blank" rel="noopener">
                    🛒 Mua sắm tại Shopee »
                </a>
            </div>
        </div>
        <div class="footer">Bài viết có chứa link quảng cáo</div>
    </div>
</body>
</html>
